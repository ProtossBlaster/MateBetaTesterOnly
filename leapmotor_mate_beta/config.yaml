name: "LeapMotor Mate — BetaTester"
description: "DATA-COLLECTION BETA for building REEV (range-extender) support. It logs ALL vehicle signals and lets you send us an encrypted bundle. Statistics/Costs/Trips may be SKEWED — do NOT open issues about inconsistent data. Use a Leapmotor account that is NOT used by your normal Mate at the same time."
version: "latest"
slug: "leapmotor_mate_beta"
url: "https://github.com/ProtossBlaster/MateBetaTesterOnly"
# Runs the SAME official image as prod, always the current one (:latest). Why "latest" and not a
# number: Home Assistant treats the legacy "beta" tag as SPECIALCONTAINER, so it will NOT offer an
# in-place update from an existing "beta" install to a numbered version — only "latest"/"dev" rank
# above "beta" (verified with awesomeversion). "latest" is therefore the ONLY one-click, no-reinstall,
# no-data-loss way to move testers already on "beta" onto the current build. Research / data-collection
# (full-signal capture + REEV) is turned ON at runtime by the `research` option below (see run.sh).
image: "ghcr.io/protossblaster/leapmotor-mate"
init: false
startup: "application"
boot: "auto"
homeassistant: "2024.1.0"
homeassistant_api: true

arch:
  - aarch64
  - amd64

map:
  - type: data
    read_only: false

ingress: true
ingress_port: 4000
panel_icon: "mdi:flask-outline"
panel_title: "Mate BetaTester"

ports:
  4000/tcp: null
ports_description:
  4000/tcp: "Web UI (not needed with ingress)"

options:
  log_level: "info"
  research: true

schema:
  log_level: "list(trace|debug|info|warning|error|critical)"
  research: "bool"
