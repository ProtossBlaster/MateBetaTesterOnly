name: "LeapMotor Mate — BetaTester"
description: "DATA-COLLECTION BETA for building REEV (range-extender) support. It logs ALL vehicle signals and lets you send us an encrypted bundle. Statistics/Costs/Trips may be SKEWED — do NOT open issues about inconsistent data. Use a Leapmotor account that is NOT used by your normal Mate at the same time."
version: "2.5.16"
slug: "leapmotor_mate_beta"
url: "https://github.com/ProtossBlaster/MateBetaTesterOnly"
# Runs the SAME official image AND version number as prod — kept in lockstep by
# leapmotor-mate/.github/workflows/sync-beta-addon.yml on every release. Research / data-collection
# (full-signal capture + REEV) is turned ON at runtime by the `research` option below (see run.sh),
# NOT by a separate image or a "beta" tag. So the version is a real number and updates arrive via the
# normal "Update" button.
# ⚠️ ONE-TIME MIGRATION for anyone still on the OLD "beta" tag: HA treats "beta" as SPECIALCONTAINER
# and will NOT update it in-place to a number (the Update button stays greyed). They move over ONCE,
# losslessly, with Mate's own tools: Settings → Export/Backup → download the DB backup, reinstall this
# add-on, sign in, then Settings → Export/Backup → Restore database → upload that backup. ALL data
# comes back (verified end-to-end). Fresh installs never hit this.
image: "ghcr.io/protossblaster/leapmotor-mate"
init: false
startup: "application"
boot: "auto"
homeassistant: "2024.1.0"
homeassistant_api: true

arch:
  - aarch64
  - amd64

map:
  - type: data
    read_only: false

ingress: true
ingress_port: 4000
panel_icon: "mdi:flask-outline"
panel_title: "Mate BetaTester"

ports:
  4000/tcp: null
ports_description:
  4000/tcp: "Web UI (not needed with ingress)"

options:
  log_level: "info"
  research: true

schema:
  log_level: "list(trace|debug|info|warning|error|critical)"
  research: "bool"
